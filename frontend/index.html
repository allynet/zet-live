  <script>
    (function () {
      var d = matchMedia("(prefers-color-scheme:dark)").matches;
      function ss(h) {
        return h >= 20 || h < 6;
      }
      var t = "light",
        ms = "3d";
      try {
        var r = JSON.parse(localStorage.getItem("settings") || "{}");
        var mm = r.mapThemeMode || "manual";
        if (mm === "manual") ms = r.mapStyle || "3d";
        else if (mm === "time") {
          ms = ss(new Date().getHours()) ? "3d.dark" : "3d";
        } else ms = d ? "3d.dark" : "3d";
        var m = r.uiThemeMode || "manual";
        if (m === "manual") t = r.uiThemeManual || "light";
        else if (m === "map") t = ms === "3d.dark" ? "dark" : "light";
        else if (m === "time") t = ss(new Date().getHours()) ? "dark" : "light";
        else t = d ? "dark" : "light";
      } catch (e) { }
      if (t === "dark") document.documentElement.classList.add("dark");
    })();
  </script>

<body>
  <div id="app">

        <div id="loading-spinner" style="

              border-top-color: #111827;
              border-radius: 50%;
              animation: spin 1s linear infinite;
            "></div>
        <noscript>

            JavaScript is required to use ZET Live.
          </p>
        </noscript>
      </div>
    </div>
    <style>
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      body {
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </div>
